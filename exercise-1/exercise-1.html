<!DOCTYPE html>
<html>
<head>
    <title>Lab4 - Exercise 1</title>
</head>
<body>
    <input type="text" id="textInput" placeholder="Type something here..."/>
    <label id="textLabel"></label>
    
    <button id="redButton" style="color:red;">Red</button>
    <button id="blueButton" style="color:blue;">Blue</button>
    <button id="greenButton" style="color:green;">Green</button>
    <button id="orangeButton" style="color:orange;">Orange</button>
    <button id="purpleButton" style="color:purple;">Purple</button>

    <script type="text/javascript">
        // 1. DOM Element Selection
        const textInput = document.getElementById('textInput');
        const textLabel = document.getElementById('textLabel');
        const redBtn = document.getElementById('redButton');
        const blueBtn = document.getElementById('blueButton');
        const greenBtn = document.getElementById('greenButton');
        const orangeBtn = document.getElementById('orangeButton');
        const purpleBtn = document.getElementById('purpleButton');

        // 2. Textbox to Label functionality
        textInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                // Update the label with entered text and clear the textbox 
                textLabel.textContent = textInput.value;
                textInput.value = '';
            }
        });

        // 3. Button Click Event Listeners 
        redBtn.addEventListener('click', () => {
            textLabel.style.color = 'red'; 
        });

        blueBtn.addEventListener('click', () => {
            textLabel.style.color = 'blue'; 
        });

        greenBtn.addEventListener('click', () => {
            textLabel.style.color = 'green'; 
        });

        orangeBtn.addEventListener('click', () => {
            textLabel.style.color = 'orange'; 
        });

        purpleBtn.addEventListener('click', () => {
            textLabel.style.color = 'purple'; 
        });
    </script>
</body>
</html>
