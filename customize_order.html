<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweet Scoop Ice Cream | Customize Order</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Timer at top of main content */
      .order-timer {
        text-align: center;
        font-weight: 700;
        font-size: 1.25rem;
        margin: 1rem 0;
      }

      /* Price display sits right before Finish Order button */
      .price-display {
        text-align: center;
        font-weight: 700;
        margin: 1rem 0;
      }
    </style>
  </head>

  <body>
    <!-- Header -->
    <header>
      <img src="images/logo.jpeg" alt="Sweet Scoop Ice Cream logo" />
      <h1>Sweet Scoop Ice Cream</h1>
    </header>

    <!-- Navigation (div directly below header) -->
    <div>
      <nav aria-label="Primary">
        <a href="index.html">Home</a> |
        <a href="menu_view.html">Menu</a>
      </nav>
    </div>

    <!-- Main Content -->
    <main>
      <img class="banner" src="images/Picture2.jpeg" alt="Ice cream banner" />

      <!-- (a) 10-minute countdown timer at top of main content -->
      <div class="order-timer">
        Order timer: <span id="timer">10:00</span>
      </div>

      <form id="orderForm">
        <section class="order-block">
          <h2>Vanilla Dream</h2>
          <h3 class="order-subtitle">Choose Type</h3>

          <!-- (b) Base flavour required (radio) -->
          <label>
            <input type="radio" name="baseFlavor" value="cup" />
            <br />
            Cup
          </label>
          <br /><br />
          <label>
            <input type="radio" name="baseFlavor" value="cone" />
            <br />
            Cone
          </label>
          <br /><br />
        </section>

        <section class="order-block">
          <h2>Chocolate Bliss</h2>
          <h3 class="order-subtitle">Select Toppings</h3>

          <!-- (b) At least one topping required (checkbox) -->
          <label>
            <input type="checkbox" name="toppings" value="sprinkles" />
            <br />
            Sprinkles
          </label>
          <br />
          <label>
            <input type="checkbox" name="toppings" value="chocolate-chips" />
            <br />
            Chocolate Chips
          </label>
          <br />
          <label>
            <input type="checkbox" name="toppings" value="caramel" />
            <br />
            Caramel Drizzle
          </label>
          <br /><br />
        </section>

        <!-- (c) Total price display immediately before Finish Order button -->
        <div class="price-display">
          Total Price: <span id="totalPrice">$0.00</span>
        </div>

        <div class="finish-order">
          <!-- Use a submit button so we can validate + calculate on submit -->
          <button type="submit" class="finish-btn">Finish Order</button>
        </div>
      </form>
    </main>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 Sweet Scoop Ice Cream</p>
    </footer>

    <script>
      // (a) 10-minute countdown timer (MM:SS), auto-start on load, redirect on expiry
      const timerEl = document.getElementById("timer");
      let remainingSeconds = 10 * 60; // 10 minutes

      function renderTimer() {
        const mm = String(Math.floor(remainingSeconds / 60)).padStart(2, "0");
        const ss = String(remainingSeconds % 60).padStart(2, "0");
        timerEl.textContent = `${mm}:${ss}`;
      }

      renderTimer();

      const timerId = setInterval(() => {
        remainingSeconds -= 1;
        renderTimer();

        if (remainingSeconds <= 0) {
          clearInterval(timerId);
          window.location.href = "order_summary.html";
        }
      }, 1000);

      // (b) Validation + (c) price calculation on submit
      const form = document.getElementById("orderForm");
      const totalPriceEl = document.getElementById("totalPrice");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        // Validate base flavour (radio required)
        const baseRadios = document.querySelectorAll('input[name="baseFlavor"]');
        let baseSelected = false;
        for (const r of baseRadios) {
          if (r.checked) {
            baseSelected = true;
            break;
          }
        }

        // Validate toppings (at least one checkbox required)
        const toppingChecks = document.querySelectorAll('input[name="toppings"]');
        let toppingCount = 0;
        for (const c of toppingChecks) {
          if (c.checked) toppingCount += 1;
        }

        if (!baseSelected) {
          alert("Please select one base flavour.");
          return;
        }

        if (toppingCount < 1) {
          alert("Please select at least one topping.");
          return;
        }

        // Price calc: base $6 + $1.50 per topping
        const basePrice = 6.0;
        const total = basePrice + toppingCount * 1.5;

        totalPriceEl.textContent = `$${total.toFixed(2)}`;

        // Redirect:
        window.location.href = "order_summary.html";
      });
    </script>
  </body>
</html>
