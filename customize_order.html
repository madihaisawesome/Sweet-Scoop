<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sweet Scoop Ice Cream - Customize Order</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <img src="images/logo.jpeg" alt="Sweet Scoop logo">
    <h1>Sweet Scoop Ice Cream</h1>
  </header>


  <div class="navbar">
    <a href="index.html">Home</a>
    <span class="nav-separator">|</span>
    <a href="menu_view.html">Menu</a>
  </div>

  <div class="customize-main">
    <main class="customize-container">

      <p id="order-timer" style="font-weight: bold;">Order Time Left: 10:00</p>

      <img class="banner" src="images/Picture2.jpeg" alt="Ice cream banner">

      <form>
        <div class="section-card customize-card">
          <h2>Vanilla Dream</h2>
          <p><strong>Choose Type:</strong></p>
          <input type="radio" id="vanilla_cup" name="vanilla_type" value="Cup">
          <label for="vanilla_cup">Cup</label>
          <br><br>
          <input type="radio" id="vanilla_cone" name="vanilla_type" value="Cone">
          <label for="vanilla_cone">Cone</label>
        </div>

        <br>

        <div class="section-card customize-card">
          <h2>Chocolate Bliss</h2>
          <p><strong>Select toppings:</strong></p>
          <input type="checkbox" id="top_sprinkles" name="toppings" value="Sprinkles">
          <label for="top_sprinkles">Sprinkles</label>
          <br><br>
          <input type="checkbox" id="top_chips" name="toppings" value="Chocolate Chips">
          <label for="top_chips">Chocolate Chips</label>
          <br><br>
          <input type="checkbox" id="top_whipped" name="toppings" value="Whipped Cream">
          <label for="top_whipped">Whipped Cream</label>
        </div>

        <br>

        <p id="total-price" style="font-weight: bold;">Total Price: $6.00</p>

        <button class="button-pink submit-order-btn" type="button" onclick="submitOrder()">Submit Order</button>
      </form>
    </main>
  </div>


  <footer>
    <p>&copy; 2026 Sweet Scoop Ice Cream</p>
  </footer>

  <script>
    var timeLeft = 600;

    var timerInterval = setInterval(function () {
      timeLeft = timeLeft - 1;
      var minutes = Math.floor(timeLeft / 60);
      var seconds = timeLeft % 60;
      var mm = minutes < 10 ? "0" + minutes : minutes;
      var ss = seconds < 10 ? "0" + seconds : seconds;
      document.getElementById("order-timer").textContent = "Order Time Left: " + mm + ":" + ss;
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        window.location.href = "order_summary.html";
      }
    }, 1000);

    function submitOrder() {
      var cupChecked = document.getElementById("vanilla_cup").checked;
      var coneChecked = document.getElementById("vanilla_cone").checked;

      if (!cupChecked && !coneChecked) {
        alert("Please select a base flavor (Cup or Cone).");
        return;
      }

      var toppings = document.getElementsByName("toppings");
      var toppingSelected = false;
      for (var i = 0; i < toppings.length; i++) {
        if (toppings[i].checked) {
          toppingSelected = true;
        }
      }

      if (!toppingSelected) {
        alert("Please select at least one topping.");
        return;
      }

      var basePrice = 6;
      var toppingCount = 0;
      for (var i = 0; i < toppings.length; i++) {
        if (toppings[i].checked) {
          toppingCount = toppingCount + 1;
        }
      }
      var totalPrice = basePrice + (toppingCount * 1.50);

      document.getElementById("total-price").textContent = "Total Price: $" + totalPrice.toFixed(2);

      var selectedType = cupChecked ? "Cup" : "Cone";
      var selectedToppings = [];
      for (var i = 0; i < toppings.length; i++) {
        if (toppings[i].checked) {
          selectedToppings.push(toppings[i].value);
        }
      }

      localStorage.setItem("orderType", selectedType);
      localStorage.setItem("orderToppings", selectedToppings.join(", "));
      localStorage.setItem("orderTotal", "$" + totalPrice.toFixed(2));

      setTimeout(function () {
        window.location.href = "order_summary.html";
      }, 2000);
    }
  </script>

</body>

</html>
